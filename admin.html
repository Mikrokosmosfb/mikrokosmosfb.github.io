<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikrokosmos - Kontrol Merkezi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --mor: #7b1fa2; --koyu: #0b0314; --panel: #1a1026; --yazi: #f3e8ff; }
        body { font-family: 'Nunito', sans-serif; background-color: var(--koyu); color: var(--yazi); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: var(--panel); padding: 25px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        h1, h2, h3 { color: var(--mor); margin-top: 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--mor); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        .status { padding: 15px; border-radius: 8px; margin-top: 10px; display: none; font-weight: bold; text-align: center; border: 1px solid rgba(255,255,255,0.2); }
        .help-text { font-size: 12px; color: #aaa; margin-bottom: 15px; margin-top: -10px; }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fa-solid fa-shuttle-space"></i> Mikrokosmos Admin</h1>

    <div class="card">
        <h3><i class="fa-solid fa-gear"></i> 1. Adım: GitHub Bağlantısı</h3>
        <label>GitHub Token (PAT)</label>
        <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx">
        <label>GitHub Kullanıcı Adın / Repo Adın</label>
        <input type="text" id="gh-repo" placeholder="kullanici/repo-adi">
        <button onclick="saveSettings()" style="background: #27ae60;"><i class="fa-solid fa-save"></i> Ayarları Kaydet</button>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-book"></i> 2. Adım: Yeni Seri Oluştur</h3>
        <label>Seri ID (Küçük harf, boşluksuz, örn: solo-leveling)</label>
        <input type="text" id="s-id" placeholder="solo-leveling">
        <label>Seri Adı</label>
        <input type="text" id="s-title" placeholder="Solo Leveling">
        <label>Kapak Resmi URL</label>
        <input type="text" id="s-thumb" placeholder="https://resimlinki.com/kapak.jpg">
        <label>Tür</label>
        <select id="s-type">
            <option value="manhwa">Manhwa (Webtoon)</option>
            <option value="novel">Novel (Metin)</option>
        </select>
        <label>Açıklama / Özet</label>
        <textarea id="s-desc" rows="3"></textarea>
        <button onclick="addNewSeries()"><i class="fa-solid fa-plus"></i> Seriyi Siteye Ekle</button>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-upload"></i> 3. Adım: Bölüm Yayınla</h3>
        <label>Hangi Seri? (Daha önce verdiğin ID'yi yaz)</label>
        <input type="text" id="target-seri-id" placeholder="solo-leveling">
        <label>Bölüm Başlığı</label>
        <input type="text" id="c-title" placeholder="Bölüm 01">
        <label>İçerik (Imgbox Kodları veya Novel Metni)</label>
        <textarea id="c-content" rows="10"></textarea>
        <button onclick="publishChapter()" style="background: #e67e22;"><i class="fa-solid fa-paper-plane"></i> Bölümü Yayınla</button>
    </div>

    <div id="status-box" class="status"></div>
</div>

<script>
    // Sayfa yüklenince ayarları çek
    window.onload = function() {
        document.getElementById('gh-token').value = localStorage.getItem('gh_token') || "";
        document.getElementById('gh-repo').value = localStorage.getItem('gh_repo') || "";
    }

    function saveSettings() {
        localStorage.setItem('gh_token', document.getElementById('gh-token').value);
        localStorage.setItem('gh_repo', document.getElementById('gh-repo').value);
        showStatus("Bağlantı ayarları kaydedildi!", "#27ae60");
    }

    function showStatus(msg, color) {
        const box = document.getElementById('status-box');
        box.innerText = msg;
        box.style.backgroundColor = color;
        box.style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }

    // GitHub'a dosya göndermek için yardımcı fonksiyon (Türkçe karakter destekli)
    async function githubUpload(path, content, message, token, repo) {
        const url = `https://api.github.com/repos/${repo}/contents/${path}`;
        let sha = "";

        // Önce dosya var mı kontrol et, varsa SHA al
        const check = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
        if(check.ok) {
            const fileData = await check.json();
            sha = fileData.sha;
        }

        // Metni Base64'e çevir (Türkçe karakterleri bozmaz)
        const base64Content = btoa(unescape(encodeURIComponent(content)));

        const body = {
            message: message,
            content: base64Content,
            sha: sha
        };

        const res = await fetch(url, {
            method: 'PUT',
            headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });

        return res;
    }

    async function addNewSeries() {
        const token = document.getElementById('gh-token').value;
        const repo = document.getElementById('gh-repo').value;
        if(!token || !repo) return showStatus("Lütfen önce GitHub ayarlarını yapın!", "#c0392b");

        showStatus("Seri veritabanı güncelleniyor...", "#f39c12");

        try {
            // 1. Mevcut series.json dosyasını çek
            const res = await fetch(`https://api.github.com/repos/${repo}/contents/data/series.json`, {
                headers: { 'Authorization': `token ${token}` }
            });
            
            let currentData = [];
            if(res.ok) {
                const file = await res.json();
                currentData = JSON.parse(decodeURIComponent(escape(atob(file.content))));
            }

            // 2. Yeni seriyi ekle
            const newEntry = {
                id: document.getElementById('s-id').value.trim(),
                title: document.getElementById('s-title').value,
                type: document.getElementById('s-type').value,
                thumb: document.getElementById('s-thumb').value,
                desc: document.getElementById('s-desc').value,
                status: "Devam Ediyor"
            };

            currentData.push(newEntry);

            // 3. GitHub'a geri yükle
            const updateRes = await githubUpload('data/series.json', JSON.stringify(currentData, null, 2), "Yeni seri eklendi", token, repo);

            if(updateRes.ok) showStatus("Yeni seri başarıyla eklendi! 🚀", "#27ae60");
            else showStatus("Hata: " + updateRes.statusText, "#c0392b");

        } catch(e) {
            showStatus("Bağlantı Hatası: " + e.message, "#c0392b");
        }
    }

    async function publishChapter() {
        const token = document.getElementById('gh-token').value;
        const repo = document.getElementById('gh-repo').value;
        const targetId = document.getElementById('target-seri-id').value.trim();
        if(!targetId) return showStatus("Lütfen Seri ID yazın!", "#c0392b");

        showStatus("Bölüm dosyası işleniyor...", "#f39c12");

        try {
            // 1. Serinin bölüm dosyasını çekmeyi dene
            const path = `data/chapters/${targetId}.json`;
            const res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            
            let chapterData = [];
            if(res.ok) {
                const file = await res.json();
                chapterData = JSON.parse(decodeURIComponent(escape(atob(file.content))));
            }

            // 2. Yeni bölümü ekle
            const newChapter = {
                no: chapterData.length + 1,
                title: document.getElementById('c-title').value,
                content: document.getElementById('c-content').value,
                date: new Date().toLocaleDateString('tr-TR')
            };

            chapterData.push(newChapter);

            // 3. GitHub'a gönder
            const updateRes = await githubUpload(path, JSON.stringify(chapterData, null, 2), "Yeni bölüm eklendi", token, repo);

            if(updateRes.ok) {
                showStatus("Bölüm başarıyla yayınlandı! 🚀", "#27ae60");
                document.getElementById('c-title').value = "";
                document.getElementById('c-content').value = "";
            } else {
                showStatus("Yükleme Hatası!", "#c0392b");
            }

        } catch(e) {
            showStatus("Hata: " + e.message, "#c0392b");
        }
    }
</script>
</body>
</html>
