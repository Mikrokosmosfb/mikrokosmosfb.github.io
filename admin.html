<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Mikrokosmos Galaktik Panel</title>
    <style>
        body { font-family: sans-serif; background: #0b0314; color: #fff; padding: 20px; }
        .card { background: #1a1026; padding: 25px; border-radius: 15px; border: 2px solid purple; max-width: 800px; margin: 0 auto 30px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #7b1fa2; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #9c27b0; }
        .green { background: #27ae60 !important; }
        .orange { background: #e67e22 !important; }
        h2 { color: #7b1fa2; border-bottom: 1px solid #333; padding-bottom: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🛰️ 1. GitHub Bağlantısı</h2>
        <input type="password" id="token" placeholder="GitHub Token (PAT)">
        <input type="text" id="repo" placeholder="KullanıcıAdı/RepoAdı (Örn: msk/site)">
        <button onclick="saveConf()" class="green">Bağlantıyı Kaydet</button>
    </div>

    <div class="card">
        <h2>📚 2. Yeni Seri Ekle</h2>
        <input type="text" id="sid" placeholder="seri-id (küçük harf, boşluksuz, örn: solo-leveling)">
        <input type="text" id="stitle" placeholder="Seri Adı">
        <input type="text" id="sthumb" placeholder="Kapak Resmi URL">
        <select id="stype"><option value="manhwa">Manhwa / Webtoon</option><option value="novel">Novel</option></select>
        <textarea id="sdesc" placeholder="Seri Özeti/Konusu"></textarea>
        <button onclick="addSeries()">Seriyi Galaksiye Ekle</button>
    </div>

    <div class="card">
        <h2>🔥 3. Bölüm Yayınla</h2>
        <input type="text" id="target_sid" placeholder="Hangi Seri? (seri-id yaz)">
        <input type="text" id="ctitle" placeholder="Bölüm Başlığı (Örn: Bölüm 05)">
        <textarea id="ccontent" rows="10" placeholder="Webtoon ise Imgbox kodları, Novel ise metni buraya yapıştırın..."></textarea>
        <button onclick="addChapter()" class="orange">Bölümü Yayınla</button>
    </div>

    <script>
        // Ayarları hatırla
        window.onload = () => {
            document.getElementById('token').value = localStorage.getItem('gh_token') || "";
            document.getElementById('repo').value = localStorage.getItem('gh_repo') || "";
        };

        function saveConf() {
            localStorage.setItem('gh_token', document.getElementById('token').value);
            localStorage.setItem('gh_repo', document.getElementById('repo').value);
            alert("GitHub bağlantısı tarayıcıya kaydedildi.");
        }

        async function ghApi(path, content, msg) {
            const t = localStorage.getItem('gh_token'), r = localStorage.getItem('gh_repo');
            const url = `https://api.github.com/repos/${r}/contents/${path}`;
            
            let sha = "";
            const check = await fetch(url, { headers: { 'Authorization': `token ${t}` } });
            if(check.ok) { const f = await check.json(); sha = f.sha; }

            const body = { 
                message: msg, 
                content: btoa(unescape(encodeURIComponent(content))), 
                sha: sha 
            };

            const res = await fetch(url, { 
                method: 'PUT', 
                headers: { 'Authorization': `token ${t}`, 'Content-Type': 'application/json' }, 
                body: JSON.stringify(body) 
            });
            return res.ok;
        }

        async function addSeries() {
            const t = localStorage.getItem('gh_token'), r = localStorage.getItem('gh_repo');
            const res = await fetch(`https://api.github.com/repos/${r}/contents/data/series.json`, { headers: { 'Authorization': `token ${t}` } });
            let data = [];
            if(res.ok) { 
                const f = await res.json(); 
                data = JSON.parse(decodeURIComponent(escape(atob(f.content)))); 
            }
            
            data.push({
                id: document.getElementById('sid').value.trim(),
                title: document.getElementById('stitle').value,
                thumb: document.getElementById('sthumb').value,
                type: document.getElementById('stype').value,
                desc: document.getElementById('sdesc').value,
                status: "Devam Ediyor"
            });

            if(await ghApi('data/series.json', JSON.stringify(data, null, 2), "Yeni seri eklendi")) {
                alert("Seri başarıyla oluşturuldu!");
            }
        }

        async function addChapter() {
            const sid = document.getElementById('target_sid').value.trim();
            const t = localStorage.getItem('gh_token'), r = localStorage.getItem('gh_repo');
            const path = `data/chapters/${sid}.json`;
            
            const res = await fetch(`https://api.github.com/repos/${r}/contents/${path}`, { headers: { 'Authorization': `token ${t}` } });
            let data = [];
            if(res.ok) {
                const f = await res.json();
                data = JSON.parse(decodeURIComponent(escape(atob(f.content))));
            }

            data.push({
                no: data.length + 1,
                title: document.getElementById('ctitle').value,
                content: document.getElementById('ccontent').value,
                date: new Date().toLocaleDateString('tr-TR')
            });

            if(await ghApi(path, JSON.stringify(data, null, 2), `${sid} - yeni bölüm`)) {
                alert("Bölüm başarıyla yüklendi!");
                document.getElementById('ccontent').value = "";
            }
        }
    </script>
</body>
</html>
