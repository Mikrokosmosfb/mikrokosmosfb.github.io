<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Mikrokosmos Okuyucu</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="pv dark-mode">
    <div id="Atprogressbar" class="Atprogress-bar"></div>

    <div class="max-w mla mra pen c-999 mt-35 full oh">
        <!-- Orijinal Dropdown Üst -->
        <div class="nPL-show"></div>

        <!-- İçerik Alanı -->
        <div id="reader-content" class="check-box">
             <!-- Buraya Webtoon resimleri veya Novel metni düşecek -->
        </div>

        <!-- Orijinal Dropdown Alt -->
        <div class="nPL-show"></div>
        
        <!-- Blogger'daki Novel Ayarları (Opsiyonel eklenebilir) -->
    </div>

    <script src="assets/js/core.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const seri = params.get('seri');
        const no = parseInt(params.get('bolum'));

        async function load() {
            const res = await fetch(`data/chapters/${seri}.json`);
            const chapters = await res.json();
            const current = chapters.find(c => c.no === no);

            const out = document.getElementById('reader-content');

            // Geçmişe Kaydet (XML Mantığı)
            HISTORY.push(seri + "_" + no, { storyTitle: current.title, storyLink: window.location.href });

            // İçerik Tipi Kontrolü
            if (current.content.includes('<img') || current.content.includes('<a')) {
                // Webtoon: HTML'i temizle resimleri dikey diz
                out.innerHTML = cleanWebtoonContent(current.content);
            } else {
                // Novel: Metin olarak bas
                out.innerHTML = `<div class="novel-container Novel" style="padding:20px; line-height:2; font-size:18px;">
                    ${current.content.replace(/\n/g, '<br>')}
                </div>`;
            }

            // Navigasyonu çalıştır
            nPLPro.render(seri, no);
        }
        load();
    </script>
</body>
</html>
