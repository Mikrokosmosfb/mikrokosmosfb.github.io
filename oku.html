<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Mikrokosmos Okuyucu</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        /* Okuyucuya Özel Orijinal Kodlar */
        .check-box img { width: 100%; display: block; margin: 0 auto; }
        .Novel { max-width: 800px; margin: 0 auto; background: white; color: black; padding: 30px; line-height: 1.8; }
        .dark-mode .Novel { background: #222; color: #ccc; }
    </style>
</head>
<body class="pv"> <!-- XML'deki post view class'ı -->
    <div id="Atprogressbar" class="Atprogress-bar"></div>

    <div class="max-w mla mra pen c-999 mt-35 full oh">
        <h1 id="reader-title" class="m-0 fs-25 tac c-ddd fs-20"></h1>
        
        <!-- Orijinal nPL Dropdown (Bölüm Seçici) -->
        <div class="nPL-show" id="nPL"></div>

        <div id="reader-content" class="check-box">
            <!-- Buraya resimler veya metin gelecek -->
        </div>

        <div class="nPL-show" id="nPL2"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const seri = params.get('seri');
        const no = parseInt(params.get('bolum'));

        async function loadReader() {
            const res = await fetch(`data/chapters/${seri}.json`);
            const chapters = await res.json();
            const current = chapters.find(c => c.no === no);
            
            document.getElementById('reader-title').innerText = current.title;
            const out = document.getElementById('reader-content');

            // XML'deki mantık: Manhwa ise img etiketlerini ayıkla, Novel ise metin bas
            if(current.content.includes('<img')) {
                // Manhwa Modu (Imgbox HTML temizleme)
                const div = document.createElement('div');
                div.innerHTML = current.content;
                const imgs = div.querySelectorAll('img');
                out.innerHTML = Array.from(imgs).map(i => `<img src="${i.src}" loading="lazy">`).join('');
            } else {
                // Novel Modu
                out.classList.add('Novel');
                out.innerHTML = current.content.replace(/\n/g, '<br>');
            }
        }
        loadReader();

        // Orijinal Progress Bar Mantığı
        window.onscroll = function() {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (winScroll / height) * 100;
            document.getElementById("Atprogressbar").style.width = scrolled + "%";
        };
    </script>
</body>
</html>
