<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikrokosmos - Seri Detayları</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --mor: #7b1fa2; --koyu: #0b0314; --panel: rgba(255, 255, 255, 0.08); --yazi: #f3e8ff; }
        body { font-family: 'Nunito', sans-serif; background-color: var(--koyu); color: var(--yazi); margin: 0; }
        
        .uzay-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 20% 15%, #9333ea66, transparent 25%),
                        radial-gradient(circle at 80% 80%, #7c3aed44, transparent 30%),
                        linear-gradient(135deg, #05010a, #16051f); }

        header { background: linear-gradient(to right, var(--mor), #3367D6); padding: 15px 20px; text-align: center; }
        header a { color: white; text-decoration: none; font-weight: 900; font-size: 20px; }

        .container { max-width: 900px; margin: 30px auto; padding: 20px; }

        /* Üst Bilgi Alanı */
        .series-header { display: flex; gap: 30px; background: var(--panel); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .series-thumb img { width: 220px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 2px solid var(--mor); }
        .series-info { flex: 1; }
        .series-info h1 { margin-top: 0; color: var(--mor); }
        .status-badge { display: inline-block; background: #27ae60; padding: 5px 15px; border-radius: 5px; font-size: 12px; font-weight: bold; margin-bottom: 15px; }

        /* Bölüm Listesi */
        .chapter-section { margin-top: 40px; }
        .chapter-section h3 { border-bottom: 2px solid var(--mor); padding-bottom: 10px; }
        .chapter-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 10px; }
        .chapter-item { background: rgba(255,255,255,0.05); padding: 15px 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; text-decoration: none; color: white; border: 1px solid transparent; }
        .chapter-item:hover { background: rgba(123, 31, 162, 0.2); border-color: var(--mor); transform: translateX(5px); }
        .chapter-date { font-size: 12px; opacity: 0.5; }

        @media (max-width: 600px) {
            .series-header { flex-direction: column; align-items: center; text-align: center; }
            .series-thumb img { width: 180px; }
        }
    </style>
</head>
<body>
    <div class="uzay-bg"></div>
    <header><a href="index.html">MIKROKOSMOS FB</a></header>

    <div class="container">
        <div id="series-content">
            <!-- JS Verileri Buraya Dolduracak -->
            <div style="text-align:center;">Yükleniyor...</div>
        </div>

        <div class="chapter-section">
            <h3>Bölümler</h3>
            <div id="chapter-list-container">
                <ul class="chapter-list" id="chapter-list">
                    <!-- Bölümler Buraya Gelecek -->
                </ul>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const seriId = urlParams.get('id'); // URL'deki ?id=seri-adi kısmını alır

        async function loadSeriesDetails() {
            try {
                // 1. Seri bilgilerini al
                const res = await fetch('data/series.json?t=' + new Date().getTime());
                const allSeries = await res.json();
                const s = allSeries.find(item => item.id === seriId);

                if(!s) { document.getElementById('series-content').innerHTML = "Seri bulunamadı!"; return; }

                document.getElementById('series-content').innerHTML = `
                    <div class="series-header">
                        <div class="series-thumb"><img src="${s.thumb}"></div>
                        <div class="series-info">
                            <span class="status-badge">${s.status}</span>
                            <h1>${s.title}</h1>
                            <p>${s.desc}</p>
                            <p><strong>Tür:</strong> ${s.type.toUpperCase()}</p>
                        </div>
                    </div>
                `;

                // 2. Bölümleri al
                const chapRes = await fetch(`data/chapters/${seriId}.json?t=` + new Date().getTime());
                const chapters = await chapRes.json();
                const list = document.getElementById('chapter-list');
                
                // Bölümleri sondan başa (yeniden eskiye) sırala
                chapters.reverse().forEach(c => {
                    list.innerHTML += `
                        <a href="oku.html?seri=${seriId}&bolum=${c.no}" class="chapter-item">
                            <span>${c.title}</span>
                            <span class="chapter-date">${c.date}</span>
                        </a>
                    `;
                });

            } catch (e) {
                document.getElementById('chapter-list').innerHTML = "Henüz bölüm eklenmemiş.";
            }
        }

        window.onload = loadSeriesDetails;
    </script>
</body>
</html>
