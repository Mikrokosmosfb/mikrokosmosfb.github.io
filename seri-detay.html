<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Mikrokosmos Detay</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
</head>
<body id="modeSwitch">
    <header class="bg-main header-background">
        <div class="max-w mra mla grid gtc-header aic">
            <a href="index.html" class="c-fff fsi fs-20 fw-600">MIKROKOSMOS FB</a>
        </div>
    </header>

    <main class="max-w mra mla mt-sv15">
        <!-- Üst Kısım -->
        <div id="series-meta-area" class="grid gtc-235fr gg-15">
            <!-- JS ile XML tasarımına göre dolacak -->
        </div>

        <!-- Bölüm Listesi (Orijinal bxcl yapısı) -->
        <div class="bc-fff r2 mb-15 s1 post oh" style="margin-top:20px;">
            <h2 class="c-theme m-0 bb-1pxsf y9x19p fs-15 flex aic">
                <i class="fa-solid fa-list mr-7"></i> Bölüm Listesi
            </h2>
            <div class="bxcl p-13">
                <ul id="clwd-list">
                    <!-- Bölümler buraya li olarak gelecek -->
                </ul>
            </div>
        </div>
    </main>

    <script src="assets/js/core.js"></script>
    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        async function load() {
            const sRes = await fetch('data/series.json');
            const seri = (await sRes.json()).find(x => x.id === id);
            
            document.getElementById('series-meta-area').innerHTML = `
                <div class="a1"><div class="b-img oh"><img src="${seri.thumb}" class="full"></div></div>
                <div class="a2 s1 p-20 bc-fff r2">
                    <h1 class="mt-0">${seri.title}</h1>
                    <p>${seri.desc}</p>
                    <button class="bookmark_hr" data-id="${seri.id}" data-title="${seri.title}" data-img="${seri.thumb}">Kütüphaneye Ekle</button>
                </div>
            `;

            const cRes = await fetch(`data/chapters/${id}.json`);
            const chapters = await cRes.json();
            document.getElementById('clwd-list').innerHTML = chapters.reverse().map(c => `
                <li>
                    <div class="chbox">
                        <div class="eph-num">
                            <a href="oku.html?seri=${id}&bolum=${c.no}">
                                <span class="chapternum">${c.title}</span>
                                <span class="chapterdate">${c.date}</span>
                            </a>
                        </div>
                    </div>
                </li>
            `).join('');
        }
        load();
    </script>
</body>
</html>
