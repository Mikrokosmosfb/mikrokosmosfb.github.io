<!-- bookmark.html -->
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kütüphanem - Mikrokosmos</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .bookmark-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding: 15px 0;
        }
        .remove-btn {
            background: #d9534f;
            color: white;
            border: none;
            padding: 6px 12px;
            width: 100%;
            border-radius: 0 0 var(--border-radius) var(--border-radius);
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body id="modeSwitch">
    <script>
        if (localStorage.getItem('mode') === 'darkmode') {
            document.body.classList.add('dark-mode');
        }
    </script>

    <span class="rippleff" id="clickRipple"></span>

    <!-- Birebir Görsel Header (Row 1) -->
    <header>
        <div class="max-w header-container">
            <div class="flex aic gap-15">
                <i class="fa-solid fa-bars menu-toggle-btn" onclick="toggleMobileMenu()"></i>
                <a href="index.html" class="header-logo-link">
                    <img src="https://blogger.googleusercontent.com/img/a/AVvXsEjVv-oixP9NPWX-EcVGiGKMIFaWlrv0HtFrJ3KtPJGPZbNkMdKV2ZTHYXWwtd0YxXZXsTQVzfEJK9ZZrQwygaVXjn99XAsmIy7FVUtAhMGNpqm9wyB17Dsx-CQebDnTfplj3wY5qv-smuQFxobZNLa340zpSjDlx-pPmlv1_o3JyIOiG-Oy_kJLU-ww=s783" alt="Mikrokosmos Logo">
                </a>
            </div>
            
            <nav class="header-nav" id="headerNav">
                <a href="index.html"><i class="fa-solid fa-house"></i> Ana Sayfa</a>
                <a href="seriler.html"><i class="fa-solid fa-list-ul"></i> Seriler</a>
                <a href="seriler.html"><i class="fa-solid fa-table-cells-large"></i> Katagoriler</a>
                <a href="seriler.html"><i class="fa-solid fa-arrow-down-a-z"></i> A-Z Liste</a>
                <div class="dropdown">
                    <a href="#" class="dropbtn"><i class="fa-solid fa-circle-nodes"></i> Diğer <i class="fa-solid fa-caret-down"></i></a>
                    <div class="dropdown-content">
                        <a href="https://discord.gg/5d6sseKRfs" target="_blank">- Discord</a>
                        <a href="#">- Ekip Başvuru</a>
                        <a href="#">- İstek Paneli</a>
                        <a href="#">- Sorun Bildir</a>
                    </div>
                </div>
            </nav>

            <div class="flex aic gap-15">
                <div class="dark-mode-container">
                    <label class="switch">
                        <input type="checkbox" id="darkModeToggle" onclick="toggleDarkMode()">
                        <span class="slider-round"></span>
                    </label>
                </div>

                <div class="search-container">
                    <input type="text" id="liveSearchInput" placeholder="Bu blogda ara">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <div id="resLive"></div>
                </div>

                <a href="bookmark.html" class="kutuphane-btn"><i class="fa-solid fa-book"></i> Kütüphane</a>
            </div>
        </div>
    </header>

    <div class="max-w" style="margin-top: 30px; margin-bottom: 50px;">
        <h2 style="color: var(--primary-color); border-bottom: 1px solid #ddd; padding-bottom: 10px;"><i class="fa-solid fa-bookmark"></i> Kişisel Kütüphanem</h2>
        <p style="font-size: 14px; opacity: 0.8; margin-bottom: 30px;">Kütüphanenize kaydettiğiniz seriler yerel olarak tarayıcınızda saklanır.</p>

        <div id="bookmarkContainer" class="bookmark-grid"></div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        function toggleMobileMenu() {
            document.getElementById("headerNav").classList.toggle("active");
        }

        document.addEventListener("DOMContentLoaded", () => {
            renderBookmarks();
        });

        function getBookmarks() {
            return JSON.parse(localStorage.getItem("mikro_bookmarks") || "[]");
        }

        function renderBookmarks() {
            const container = document.getElementById("bookmarkContainer");
            const bookmarks = getBookmarks();

            if (bookmarks.length === 0) {
                container.innerHTML = `<p style="color:#999; padding: 40px; text-align:center; grid-column: 1/-1;">Kütüphanenizde henüz hiçbir seri bulunmuyor. Detay sayfalarından dilediğiniz serileri ekleyebilirsiniz.</p>`;
                return;
            }

            container.innerHTML = "";
            bookmarks.forEach(s => {
                const badgeClass = s.type.toLowerCase();
                container.innerHTML += `
                    <div class="bookItem" id="bookmark-card-${s.id}">
                        <a href="series.html?id=${s.id}">
                            <div class="snippet-thumbnail">
                                <img src="${s.cover}" alt="${s.title}">
                                <span class="po ${badgeClass}">${s.type}</span>
                            </div>
                        </a>
                        <div class="data" style="padding: 10px 10px 0 10px;">
                            <h2 style="height: 38px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;"><a href="series.html?id=${s.id}">${s.title}</a></h2>
                        </div>
                        <button class="remove-btn" onclick="removeBookmark('${s.id}')"><i class="fa-solid fa-trash"></i> Listeden Çıkar</button>
                    </div>
                `;
            });
        }

        function removeBookmark(id) {
            let bookmarks = getBookmarks();
            bookmarks = bookmarks.filter(b => b.id !== id);
            localStorage.setItem("mikro_bookmarks", JSON.stringify(bookmarks));
            renderBookmarks();
        }
    </script>
</body>
</html>
