<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikrokosmos Fansub | Galaksiniz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --mor: #7b1fa2; --mavi: #3367D6; --koyu: #0b0314; --panel: rgba(255, 255, 255, 0.08); }
        body { margin: 0; font-family: 'Nunito', sans-serif; background-color: var(--koyu); color: #f3e8ff; }
        .uzay-bg { position: fixed; inset: 0; z-index: -1; background: linear-gradient(135deg, #05010a, #16051f); }
        .uzay-bg::before { content: ""; position: absolute; inset: 0; background-image: radial-gradient(#fff 1px, transparent 1px); background-size: 50px 50px; opacity: 0.2; }
        header { background: linear-gradient(to right, var(--mor), var(--mavi)); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        header a { color: white; text-decoration: none; font-weight: 900; }
        nav a { margin-left: 15px; font-size: 14px; }
        .search-area { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        #searchInput { width: 100%; padding: 12px; border-radius: 25px; border: 2px solid var(--mor); background: rgba(0,0,0,0.4); color: white; outline: none; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .myGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .bookItem { background: var(--panel); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; position: relative; }
        .bookItem:hover { transform: translateY(-5px); border-color: var(--mor); }
        .thumb { width: 100%; aspect-ratio: 3/4; object-fit: cover; border-bottom: 2px solid var(--mor); }
        .data { padding: 10px; text-align: center; }
        .data h2 { font-size: 14px; margin: 0; height: 35px; overflow: hidden; }
        .type-badge { position: absolute; top: 5px; left: 5px; background: var(--mor); font-size: 9px; padding: 2px 7px; border-radius: 4px; font-weight: bold; }
        @media (max-width: 600px) { .myGrid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="uzay-bg"></div>
    <header>
        <a href="index.html" style="font-size: 20px;">MIKROKOSMOS FB</a>
        <nav>
            <a href="index.html">ANA SAYFA</a>
            <a href="seriler.html">SERİLER</a>
            <a href="admin.html"><i class="fa-solid fa-lock"></i></a>
        </nav>
    </header>
    <div class="search-area"><input type="text" id="searchInput" placeholder="Seri ara..." onkeyup="search()"></div>
    <div class="container">
        <div id="series-grid" class="myGrid">Yükleniyor...</div>
    </div>
    <script>
        let seriesData = [];
        async function load() {
            try {
                const r = await fetch('data/series.json?t=' + Date.now());
                seriesData = await r.json();
                render(seriesData);
            } catch (e) { document.getElementById('series-grid').innerHTML = "Henüz seri yok."; }
        }
        function render(data) {
            const g = document.getElementById('series-grid');
            g.innerHTML = data.map(s => `
                <div class="bookItem">
                    <span class="type-badge">${s.type}</span>
                    <a href="seri-detay.html?id=${s.id}"><img src="${s.thumb}" class="thumb"></a>
                    <div class="data"><h2>${s.title}</h2></div>
                </div>
            `).join('');
        }
        function search() {
            const t = document.getElementById('searchInput').value.toLowerCase();
            render(seriesData.filter(s => s.title.toLowerCase().includes(t)));
        }
        window.onload = load;
    </script>
</body>
</html>
